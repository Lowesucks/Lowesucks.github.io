<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para ti</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    .card {
      max-width: 500px;
      padding: 30px;
      border-radius: 20px;
      background: #1c1c1c;
      box-shadow: 0 0 30px rgba(255, 120, 180, 0.3);
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 999px;
      background: pink;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Felices 5 meses ❤️</h1>
    <p>Hice esto para ti porque aunque no estemos cerca, quería regalarte algo hecho por mí.</p>
    <button onclick="alert('Te quiero mucho ❤️')">Presiona aquí</button>
  </div>
</body>
</html>
